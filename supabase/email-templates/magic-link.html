<!--
  Supabase Email Template: Magic Link
  Paste into: Supabase Dashboard → Authentication → Email Templates → "Magic Link"
  Subject line: Your Spectyra sign-in link
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Spectyra</title>
</head>
<body style="margin:0;padding:0;background-color:#F1EFE8;font-family:'DM Sans','Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F1EFE8;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;border:1px solid #D3D1C7;max-width:520px;width:100%;">
          <!-- Header -->
          <tr>
            <td style="background-color:#0C447C;border-radius:12px 12px 0 0;padding:32px 40px;text-align:center;">
              <div style="font-family:'Source Sans Pro','DM Sans','Segoe UI',sans-serif;font-size:26px;font-weight:700;color:#E6F1FB;letter-spacing:0.02em;">
                Spectyra
              </div>
              <div style="font-family:'DM Mono','Courier New',monospace;font-size:11px;color:#85B7EB;letter-spacing:0.06em;margin-top:4px;text-transform:uppercase;">
                AI Infrastructure Intelligence
              </div>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:36px 40px 24px;">
              <h1 style="margin:0 0 12px;font-family:'Source Sans Pro','DM Sans',sans-serif;font-size:22px;font-weight:600;color:#042C53;">
                Sign in to Spectyra
              </h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#444441;">
                Click the button below to securely sign in. This link expires in 10 minutes.
              </p>
              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
                <tr>
                  <td style="background-color:#0C447C;border-radius:8px;">
                    <a href="{{ .ConfirmationURL }}"
                       target="_blank"
                       style="display:inline-block;padding:14px 36px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#ffffff;text-decoration:none;">
                      Sign in to Spectyra
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#888780;">
                If you didn't request this link, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px 28px;border-top:1px solid #D3D1C7;">
              <p style="margin:0;font-size:12px;color:#888780;text-align:center;">
                &copy; {{ now.Format "2006" }} Spectyra &mdash; spectyra.ai
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
