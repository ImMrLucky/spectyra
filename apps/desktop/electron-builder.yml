appId: com.spectyra.openclaw
productName: Spectyra for OpenClaw
copyright: Copyright © Spectyra

# Pinned for electron-builder + pnpm (resolves even when Electron is not hoisted to this package).
electronVersion: 28.3.3

# Keep only English Chromium/Electron UI strings (~tens of MB saved vs all locales).
# Windows uses *.pak names like en-US; macOS uses *.lproj dirs like en.
electronLanguages:
  - en
  - en-US

# Predictable filenames for hosting (CDN / Netlify / GitHub Releases)
artifactName: Spectyra-OpenClaw-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: assets

files:
  - dist-electron/**/*
  - dist/renderer/**/*
  - package.json
  - "!**/*.map"

extraResources:
  - from: resources/companion
    to: companion
    filter:
      - "**/*"
      - "!**/*.map"

asar: true

mac:
  category: public.app-category.developer-tools
  # Explicit path so DMG / Finder always use the repo icon (1024×1024 PNG → .icns at pack time).
  icon: assets/icon.png
  target:
    - dmg
    - zip
  gatekeeperAssess: false

# Windows-only: tighter zip/nsis archives (macOS dmg/zip stay on default "normal").
win:
  compression: maximum
  target:
    - nsis
    - zip
  executableName: spectyra-openclaw

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Spectyra for OpenClaw
