<ng-container *ngIf="isDesktop; else webShell">
  <div class="desktop-app" [class.desktop-app--darwin]="desktopIsDarwin">
    <div class="dt-titlebar">
      <div class="dt-brand">
        <img src="assets/spectyra-icon.png" alt="Spectyra" class="dt-logo-icon" />
        <span class="dt-wordmark" routerLink="/desktop/live">Spectyra</span>
      </div>
      <div class="dt-spacer"></div>
    </div>

    <nav class="dt-nav">
      <a class="dt-nav-item" routerLink="/desktop/live" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: false }">
        <span class="dt-live-dot"></span>Live
      </a>
      <a class="dt-nav-item" routerLink="/desktop/sessions" routerLinkActive="active">Sessions</a>
      <a class="dt-nav-item" routerLink="/desktop/history" routerLinkActive="active">History</a>
      <a class="dt-nav-item" routerLink="/desktop/compare" routerLinkActive="active">Compare</a>
      <a class="dt-nav-item" routerLink="/desktop/agent-companion" routerLinkActive="active">Agent Companion</a>
      <a class="dt-nav-item" routerLink="/desktop/runs" routerLinkActive="active">Runs</a>
      <a class="dt-nav-item" routerLink="/desktop/security" routerLinkActive="active">Security</a>
      <a class="dt-nav-item" routerLink="/desktop/settings" routerLinkActive="active">Settings</a>
      <a class="dt-nav-item" *ngIf="showSuperuserLink" routerLink="/superuser" routerLinkActive="active">Superuser</a>
      <a class="dt-nav-item" routerLink="/login" routerLinkActive="active">Sign in</a>
    </nav>

    <main class="desktop-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-container>

<ng-template #webShell>
  <div class="app-container">
    <mat-toolbar class="app-header" color="primary">
      <div class="header-left">
        <button
          *ngIf="isAuthenticated"
          mat-icon-button
          (click)="toggleSidebar()"
          class="sidebar-toggle"
          aria-label="Toggle sidebar"
        >
          <mat-icon>menu</mat-icon>
        </button>
        <h1 routerLink="/" class="logo">
          <img src="assets/spectyra-icon.png" alt="Spectyra" class="logo-icon" />
          Spectyra
        </h1>
      </div>

      <div class="header-right">
        <ng-container *ngIf="isAuthenticated">
          <app-org-switcher></app-org-switcher>
        </ng-container>

        <span *ngIf="!isAuthenticated" class="auth-links">
          <a routerLink="/login">Login</a>
          <a routerLink="/register">Sign Up</a>
        </span>
        <span *ngIf="isAuthenticated" class="auth-links">
          <span class="user-email">{{ userEmail }}</span>
          <button (click)="logout()" class="btn-logout">Logout</button>
        </span>
      </div>
    </mat-toolbar>

    <div class="app-body">
      <mat-sidenav-container class="sidenav-container">
        <mat-sidenav
          #sidenav
          [(opened)]="sidebarOpen"
          mode="side"
          class="app-sidenav"
          [class.collapsed]="sidebarCollapsed"
          [style.width.px]="sidebarCollapsed ? 64 : 256"
        >
          <nav class="sidebar-nav">
            <ng-container *ngFor="let item of navItems; let i = index">
              <div
                *ngIf="isAuthenticated && item.section && !sidebarCollapsed"
                class="nav-section-label"
                [class.first]="i === 0"
              >{{ item.section }}</div>
              <div *ngIf="isAuthenticated && item.section && sidebarCollapsed && i > 0" class="nav-section-divider"></div>

              <a
                *ngIf="(!item.requiresAuth || isAuthenticated) && (!item.adminOnly || showAdminLink) && (!item.superuserOnly || showSuperuserLink)"
                [routerLink]="item.route"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: item.route === '/overview' }"
                class="nav-item"
                [class.collapsed]="sidebarCollapsed"
              >
                <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
                <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
              </a>
            </ng-container>
          </nav>
        </mat-sidenav>

        <mat-sidenav-content class="app-main">
          <router-outlet></router-outlet>
        </mat-sidenav-content>
      </mat-sidenav-container>
    </div>
  </div>
</ng-template>
