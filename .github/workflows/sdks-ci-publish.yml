# Phase 7: verify sdks build in CI (wire `twine` / `gh release upload` when publishing for real).
name: Multi-language SDKs CI

on:
  push:
    paths:
      - "sdks/**"
      - ".github/workflows/sdks-ci-publish.yml"
  pull_request:
    paths:
      - "sdks/**"
      - ".github/workflows/sdks-ci-publish.yml"
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install build pytest
          python -m build
          pytest -q

  java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
      - run: mvn -q test

  dotnet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet build -c Release

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - run: go test ./...
