# Builds Desktop artifacts for your distribution channel (Netlify, CDN, etc.).
#
# Usage:
#   git tag desktop-v1.0.0 && git push origin desktop-v1.0.0
#   Or: Actions → "Release Desktop" → Run workflow

name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (DMG + zip)
        run: pnpm desktop:make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spectyra-desktop-macos
          path: apps/desktop/deploy-out/out/make/
          if-no-files-found: error

  build-windows:
    name: Build (Windows — Squirrel + zip)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (Squirrel installer + zip)
        run: pnpm --filter @spectyra/desktop deploy apps/desktop/deploy-out && pnpm --dir apps/desktop/deploy-out run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spectyra-desktop-windows
          path: apps/desktop/deploy-out/out/make/
          if-no-files-found: error
