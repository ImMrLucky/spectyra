# Builds installable Desktop artifacts (DMG / zip / Squirrel) without requiring users to
# clone the repo. Attach outputs to a GitHub Release when you push a matching tag.
#
# Usage:
#   git tag desktop-v1.0.0
#   git push origin desktop-v1.0.0
#
# Or: Actions → "Release Desktop" → Run workflow

name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*" # e.g. desktop-v1.0.0 — avoids clashing with generic lib tags
  workflow_dispatch:

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop installers
        run: pnpm --filter @spectyra/desktop run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spectyra-desktop-macos
          path: apps/desktop/out/
          if-no-files-found: error

  # Uncomment when you want Windows installers from CI (requires signing setup for production).
